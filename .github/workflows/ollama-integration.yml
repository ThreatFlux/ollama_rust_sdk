name: Ollama Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.96.0

jobs:
  integration-test:
    name: Ollama Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model: ["llama3.2:1b", "qwen2.5:0.5b"]

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Wait for Ollama
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:11434/ > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done

      - name: Pull test model
        run: |
          curl -X POST http://localhost:11434/api/pull \
            -d '{"name": "${{ matrix.model }}", "stream": false}'
          sleep 5
          curl http://localhost:11434/api/tags | jq .

      - name: Run integration tests
        env:
          OLLAMA_HOST: http://localhost:11434
          TEST_MODEL: ${{ matrix.model }}
        run: cargo test --test integration -- --nocapture

      - name: Test examples
        env:
          OLLAMA_HOST: http://localhost:11434
        run: |
          cargo run --example basic_generation
          timeout 30 cargo run --example streaming_chat || true
          cargo run --example embeddings

  tool-calling-test:
    name: Tool Calling Integration
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Wait for Ollama
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:11434/ > /dev/null; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done

      - name: Pull tool-supporting model
        run: |
          curl -X POST http://localhost:11434/api/pull \
            -d '{"name": "mistral:7b-instruct", "stream": false}' || \
          curl -X POST http://localhost:11434/api/pull \
            -d '{"name": "llama3.2:3b-instruct", "stream": false}'
          sleep 5

      - name: Test tool calling
        env:
          OLLAMA_HOST: http://localhost:11434
        run: |
          cargo run --example tool_test || echo "Model may not support tool calling"
          timeout 30 cargo run --example streaming_tools || echo "Streaming tools test completed"

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: ollama-rust-sdk:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
